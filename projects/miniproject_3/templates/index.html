<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nearest MBTA Stop</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #003087;
      color: #fff;
      padding: 1rem 1.5rem;
    }
    header h1 { font-size: 1.3rem; font-weight: 600; }
    header p  { font-size: 0.85rem; opacity: 0.8; margin-top: 0.2rem; }

    .container {
      max-width: 900px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    form { display: flex; gap: 0.6rem; }
    input[type="text"] {
      flex: 1;
      padding: 0.55rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    input[type="text"]:focus { outline: none; border-color: #003087; }

    button {
      padding: 0.55rem 1.2rem;
      background: #003087;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #00256b; }
    button:disabled { background: #888; cursor: default; }

    #status {
      margin-top: 0.9rem;
      font-size: 0.92rem;
      color: #555;
      min-height: 1.2em;
    }
    #status.error { color: #c0392b; }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 560px) { .result-grid { grid-template-columns: 1fr; } }

    .result-box {
      background: #f0f4ff;
      border-left: 4px solid #003087;
      border-radius: 4px;
      padding: 0.75rem 1rem;
    }
    .result-box h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #555; margin-bottom: 0.3rem; }
    .result-box .name { font-size: 1.05rem; font-weight: 600; }
    .result-box .detail { font-size: 0.85rem; color: #555; margin-top: 0.2rem; }
    .badge {
      display: inline-block;
      margin-top: 0.4rem;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-green { background: #d4edda; color: #155724; }
    .badge-yellow { background: #fff3cd; color: #856404; }
    .badge-red { background: #f8d7da; color: #721c24; }

    #map {
      width: 100%;
      height: 420px;
      border-radius: 8px;
    }

    #results { display: none; }
  </style>
</head>
<body>

<header>
  <h1>Nearest MBTA Stop</h1>
  <p>Enter any address or place in Greater Boston to find the closest stop.</p>
</header>

<div class="container">
  <div class="card">
    <form id="search-form">
      <input
        type="text"
        id="place-input"
        placeholder="e.g. Fenway Park, 100 Main St Cambridge..."
        maxlength="200"
        autocomplete="off"
      />
      <button type="submit" id="search-btn">Search</button>
    </form>
    <div id="status"></div>
  </div>

  <div id="results">
    <div class="result-grid card">
      <div class="result-box" id="origin-box">
        <h3>Your Location</h3>
        <div class="name" id="origin-name"></div>
        <div class="detail" id="origin-coords"></div>
      </div>
      <div class="result-box" id="stop-box">
        <h3>Nearest MBTA Stop</h3>
        <div class="name" id="stop-name"></div>
        <div class="detail" id="stop-detail"></div>
        <div id="stop-wheelchair"></div>
      </div>
    </div>

    <div class="card">
      <div id="map"></div>
    </div>
  </div>
</div>

<script>
  const MAPBOX_TOKEN = {{ mapbox_token | tojson }};
  mapboxgl.accessToken = MAPBOX_TOKEN;

  let map = null;
  let markers = [];

  function initMap(centerLon, centerLat) {
    if (map) return;
    map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/streets-v12",
      center: [centerLon, centerLat],
      zoom: 13,
    });
    map.addControl(new mapboxgl.NavigationControl(), "top-right");
  }

  function clearMarkers() {
    markers.forEach(m => m.remove());
    markers = [];
  }

  function addMarker(lon, lat, color, label) {
    const el = document.createElement("div");
    el.style.cssText = `
      width:14px; height:14px; border-radius:50%;
      background:${color}; border:2px solid #fff;
      box-shadow:0 1px 4px rgba(0,0,0,0.4);
    `;
    const popup = new mapboxgl.Popup({ offset: 10 }).setText(label);
    const marker = new mapboxgl.Marker(el)
      .setLngLat([lon, lat])
      .setPopup(popup)
      .addTo(map);
    markers.push(marker);
    return marker;
  }

  function wheelchairBadge(code) {
    if (code === 1) return '<span class="badge badge-green">Wheelchair accessible</span>';
    if (code === 2) return '<span class="badge badge-red">Not accessible</span>';
    return '<span class="badge badge-yellow">Accessibility unknown</span>';
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }

  document.getElementById("search-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const place = document.getElementById("place-input").value.trim();
    if (!place) return;

    const btn = document.getElementById("search-btn");
    btn.disabled = true;
    setStatus("Searching…");
    document.getElementById("results").style.display = "none";

    try {
      const resp = await fetch(`/api/nearest?place=${encodeURIComponent(place)}`);
      const data = await resp.json();

      if (!resp.ok) {
        setStatus(data.error || "Something went wrong.", true);
        return;
      }

      const { origin, stop } = data;

      // Populate result boxes
      document.getElementById("origin-name").textContent = origin.display_name;
      document.getElementById("origin-coords").textContent =
        `${origin.lat.toFixed(5)}, ${origin.lon.toFixed(5)}`;

      document.getElementById("stop-name").textContent = stop.name;
      document.getElementById("stop-detail").textContent =
        `${stop.distance_mi} mi away` + (stop.description ? ` · ${stop.description}` : "");
      document.getElementById("stop-wheelchair").innerHTML = wheelchairBadge(stop.wheelchair_boarding);

      document.getElementById("results").style.display = "block";

      // Map
      if (MAPBOX_TOKEN) {
        initMap(origin.lon, origin.lat);
        clearMarkers();
        addMarker(origin.lon, origin.lat, "#003087", `You: ${origin.display_name}`);
        addMarker(stop.lon, stop.lat, "#e74c3c", `MBTA: ${stop.name}`);

        // Fit map to both points
        const bounds = new mapboxgl.LngLatBounds()
          .extend([origin.lon, origin.lat])
          .extend([stop.lon, stop.lat]);
        map.fitBounds(bounds, { padding: 60, maxZoom: 15 });
      }

      setStatus("");
    } catch (err) {
      setStatus("Network error — is the server running?", true);
    } finally {
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
